<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SofInventory | Iniciar sesión</title>
    <link rel="stylesheet" href="assets/styles/login-register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>


<body class="theme-blue">

    <div class="login-container">
        <img src="assets/images/logo-loginB.jpg" alt="SofInventory Logo">
        <h2>Bienvenido a SofInventory</h2>

        <form id="login-form">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingresa tu usuario" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Ingresa la contraseña" required>
                    <span class="toggle-password" id="toggle-password">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                </div>
            </div>

            <div id="login-message" class="form-message"></div>

            <button type="submit" class="login-button">Iniciar sesión</button>
        </form>

        <div class="register-prompt">
            <a href="#" class="forgot-password" id="forgot-pass">¿Olvidaste tu contraseña?</a>
        </div>
    </div>


    <script src="assets/javaScript/login.js"></script>
</body>

</html>
