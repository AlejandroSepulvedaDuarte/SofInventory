<div class="compras-container">
    <h2>Registrar Compra</h2>

    <form id="formCompra">

        <!-- DATOS DE LA COMPRA -->
        <div class="form-row">
            <div class="form-group">
                <label>Proveedor *</label>
                <select id="proveedor" required></select>
            </div>

            <div class="form-group">
                <label>Fecha *</label>
                <input type="date" id="fechaCompra" required>
            </div>

            <div class="form-group">
                <label>N° Factura *</label>
                <input type="text" id="numeroFactura" placeholder="Ej: FAC-2541" required>
            </div>

            <div class="form-group">
                <label>Tipo de Compra *</label>
                <select id="tipoCompra" required>
                    <option value="Contado">Contado</option>
                    <option value="Credito">Crédito</option>
                </select>
            </div>
        </div>

        <hr>

        <!-- AGREGAR PRODUCTO -->
        <div class="agregar-producto">
            <h3>Agregar Productos</h3>

            <div class="form-row">
                <div class="form-group">
                    <label>Nombre del Producto *</label>
                    <input type="text" id="productoNombre" placeholder="Ej: Martillo">
                </div>

                <div class="form-group">
                    <label>Marca *</label>
                    <input type="text" id="productoMarca" placeholder="Ej: Stanley">
                </div>

                <div class="form-group">
                    <label>Referencia *</label>
                    <input type="text" id="productoReferencia" placeholder="Ej: 16OZ">
                </div>

                <div class="form-group">
                    <label>Categoría *</label>
                    <select id="productoCategoria">
                        <option value="">Seleccione...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Unidad de Medida *</label>
                    <select id="productoUnidad">
                        <option value="Unidad">Unidad</option>
                        <option value="Caja">Caja</option>
                        <option value="Metro">Metro</option>
                        <option value="Litro">Litro</option>
                        <option value="Galon">Galón</option>
                        <option value="Rollo">Rollo</option>
                        <option value="Bulto">Bulto</option>
                        <option value="Kilo">Kilo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Cantidad *</label>
                    <input type="number" id="cantidadProducto" min="1" value="1">
                </div>

                <div class="form-group">
                    <label>Costo Unitario *</label>
                    <input type="number" id="costoUnitario" min="0" value="0">
                </div>

                <div class="form-group">
                    <label>IVA (%)</label>
                    <input type="number" id="ivaProducto" min="0" value="0">
                </div>

                <button type="button" id="btnAgregar" class="btn-agregar">
                    Agregar Producto
                </button>
            </div>
        </div>

        <!-- TABLA DINÁMICA -->
        <table class="tabla-compras">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Marca</th>
                    <th>Referencia</th>
                    <th>Categoría</th>
                    <th>Unidad</th>
                    <th>Cantidad</th>
                    <th>Costo Unit.</th>
                    <th>IVA %</th>
                    <th>Subtotal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="bodyProductos"></tbody>
        </table>

        <!-- TOTALES -->
        <div class="totales">
            <p>Subtotal: <span id="subtotalCompra">0</span></p>
            <p>IVA Total: <span id="ivaTotal">0</span></p>
            <p class="total-final">Total: <span id="totalCompra">0</span></p>
        </div>

        <button type="submit" class="btn-guardar">Guardar Compra</button>
    </form>
</div>

<script src="/public/assets/javaScript/compras/nueva-compra.js"></script>
