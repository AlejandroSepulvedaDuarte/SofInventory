<div class="container">
    <h2>Listado de Usuarios</h2>

    <div class="search-box">
        <input type="text" id="buscar" placeholder="Buscar usuario...">
    </div>

    <table id="tablaUsuarios">
        <thead>
            <tr>
                <th>Usuario</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<!-- MODAL EDITAR USUARIO -->
<div id="modalEditarUsuario" class="modal-overlay">
    <div class="modal-content">
        <h2>Editar Usuario</h2>

        <form id="formEditarUsuario">

            <input type="hidden" id="editarId">

            <label>Nombre Completo</label>
            <input type="text" id="editarNombre" required>

            <label>Tipo de Documento</label>
            <select id="editarTipoDocumento" required>
                <option value="cc">Cédula</option>
                <option value="ti">Tarjeta de Identidad</option>
            </select>

            <label>N° Documento</label>
            <input type="text" id="editarDocumento" required>

            <label>Correo</label>
            <input type="email" id="editarEmail" required>

            <label>Usuario</label>
            <input type="text" id="editarUsername" required>

            <label>Rol</label>
            <select id="editarRol" required></select>

            <label>Observaciones</label>
            <textarea id="editarObservaciones"></textarea>

            <div class="modal-buttons" style="text-align: center;">
                <button type="button" class="btn-cancelar" onclick="cerrarModalEditar()"
                    style="text-align: center;">Cancelar</button>
                <button type="submit" class="btn-guardar">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
<script src="/public/assets/javaScript/usuarios-roles/listado-usuarios.js"></script>
