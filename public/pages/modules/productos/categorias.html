<div class="main-container">
    
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-plus-circle"></i> Nueva Categoría</h2>
        </div>
        
        <form id="categoryForm">
            <div class="form-group">
                <label for="catNombre">Nombre de la Categoría *</label>
                <input type="text" id="catNombre" placeholder="Ej: Herramientas Eléctricas, Plomería..." required>
            </div>

            <div class="form-group">
                <label for="catTipo">Tipo de Control *</label>
                <select id="catTipo" required>
                    <option value="">Seleccione un tipo</option>
                    <option value="GENERAL">General (Estándar)</option>
                    <option value="HERRAMIENTA">Herramienta (Marca y Garantía)</option>
                    <option value="ELECTRICO">Eléctrico (Voltaje y Especificaciones)</option>
                    <option value="LIQUIDO">Líquido (Litros / Galones)</option>
                    <option value="TORNILLERIA">Tornillería (Unidad o Caja)</option>
                </select>
                <span class="hint" id="typeHint">Define qué campos pedirá el producto al crearse.</span>
            </div>

            <div class="form-group">
                <label for="catDesc">Descripción (Opcional)</label>
                <textarea id="catDesc" rows="3" placeholder="Breve descripción de la categoría..."></textarea>
            </div>

            <button type="submit" class="btn-save">
                <i class="fas fa-save"></i> Guardar Categoría
            </button>
        </form>
    </div>

    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-list"></i> Categorías Existentes</h2>
            <span class="hint" id="totalCats">0 registros</span>
        </div>
        
        <table class="table-categorias">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Tipo Control</th>
                    <th>Creado Por</th>
                    <th style="text-align:center;">Acciones</th>
                </tr>
            </thead>
            <tbody id="categoriesTableBody"></tbody>
        </table>
    </div>
</div>
<script src="../assets/javaScript/productos/categorias.js"></script>
